<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="view-mode">

    <!-- Schermata Login -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Dashboard</h2>
            <input type="password" id="password-input" placeholder="Password">
            <button onclick="login()">Accedi</button>
        </div>
    </div>

    <!-- Contenuto Dashboard -->
    <div id="dashboard" style="display:none;">
        <header>
            <h1>Dashboard</h1>
            <button id="toggle-edit" onclick="toggleEditMode()" title="Modifica">⚙️</button>
        </header>

        <!-- Pannello Modifica (Nascosto di base) -->
        <div id="edit-panel">
            <div class="panel-section">
                <h3>Aggiungi Categoria</h3>
                <input type="text" id="cat-name" placeholder="Nome categoria...">
                <div id="palette"></div>
                <button class="btn-add" onclick="addCategory()">+ Categoria</button>
            </div>

            <div class="panel-section">
                <h3>Aggiungi Link</h3>
                <input type="text" id="link-name" placeholder="Nome sito...">
                <input type="text" id="link-url" placeholder="URL (https://...)">
                <select id="link-cat-select"></select>
                <button class="btn-add" onclick="addLink()">+ Link</button>
            </div>
            
            <button class="btn-logout" onclick="logout()">Esci e Blocca</button>
        </div>

        <main id="links-container">
            <!-- I link appariranno qui -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
